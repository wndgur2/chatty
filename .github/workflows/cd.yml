name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE_NAME: chatty-backend
  NGINX_IMAGE_NAME: chatty-nginx

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      nginx_image: ${{ steps.meta.outputs.nginx_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        run: |
          OWNER_LOWER="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${GITHUB_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${OWNER_LOWER}/${BACKEND_IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${REGISTRY}/${OWNER_LOWER}/${NGINX_IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/nginx/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.nginx_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.nginx_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on production host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          NGINX_IMAGE: ${{ needs.build-and-push.outputs.nginx_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          if [ -z "${DEPLOY_PATH}" ]; then
            echo "DEPLOY_PATH secret must be set (path to deploy folder on server)."
            exit 1
          fi
          scp deploy/docker-compose.prod.yml deploy/scripts/deploy-prod.sh "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x '${DEPLOY_PATH}/deploy-prod.sh' && \
            DEPLOY_PATH='${DEPLOY_PATH}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' \
            BACKEND_IMAGE='${BACKEND_IMAGE}' NGINX_IMAGE='${NGINX_IMAGE}' IMAGE_TAG='${IMAGE_TAG}' \
            '${DEPLOY_PATH}/deploy-prod.sh'"

      - name: Smoke health check
        env:
          PROD_HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL }}
        run: |
          if [ -z "${PROD_HEALTHCHECK_URL}" ]; then
            echo "PROD_HEALTHCHECK_URL secret must be set."
            exit 1
          fi
          curl --fail --show-error --silent --max-time 15 "${PROD_HEALTHCHECK_URL}" > /dev/null
