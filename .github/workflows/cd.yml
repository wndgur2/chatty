name: CD

on:
  push:
    branches:
      - main
      - cd-test/**

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE_NAME: chatty-backend
  NGINX_IMAGE_NAME: chatty-nginx
  VITE_RELEASE_SHA: ${{ github.sha }}
  VITE_API_URL: ${{ secrets.PUBLIC_ORIGIN }}
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_FCM_VAPID_KEY: ${{ secrets.VITE_FCM_VAPID_KEY }}

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-24.04-arm
    concurrency:
      group: cd-build-${{ github.ref }}
      cancel-in-progress: true
    environment:
      name: production
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      nginx_image: ${{ steps.meta.outputs.nginx_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        run: |
          OWNER_LOWER="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${GITHUB_SHA}"
          RELEASE_BUILT_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_built_at=${RELEASE_BUILT_AT}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${OWNER_LOWER}/${BACKEND_IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${REGISTRY}/${OWNER_LOWER}/${NGINX_IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate frontend build args
        run: |
          if [ -z "${VITE_API_URL}" ]; then
            echo "PUBLIC_ORIGIN secret must be set for VITE_API_URL."
            exit 1
          fi

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/nginx/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.nginx_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.nginx_image }}:latest
          build-args: |
            VITE_RELEASE_SHA=${{ env.VITE_RELEASE_SHA }}
            VITE_RELEASE_BUILT_AT=${{ steps.meta.outputs.release_built_at }}
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_FIREBASE_API_KEY=${{ env.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ env.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ env.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ env.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ env.VITE_FIREBASE_APP_ID }}
            VITE_FCM_VAPID_KEY=${{ env.VITE_FCM_VAPID_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: deploy-production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-push
    concurrency:
      group: cd-deploy-production
      cancel-in-progress: false
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate deployment freshness
        id: freshness
        env:
          CURRENT_SHA: ${{ github.sha }}
        run: |
          LATEST_SHA="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [ -z "${LATEST_SHA}" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Failed to resolve latest main SHA; continuing deploy."
            exit 0
          fi
          if [ "${CURRENT_SHA}" != "${LATEST_SHA}" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Stale run (${CURRENT_SHA}); latest main is ${LATEST_SHA}. Skipping deploy."
            exit 0
          fi
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Start SSH agent
        if: steps.freshness.outputs.should_deploy == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        if: steps.freshness.outputs.should_deploy == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on production host
        if: steps.freshness.outputs.should_deploy == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          NGINX_IMAGE: ${{ needs.build-and-push.outputs.nginx_image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          if [ -z "${DEPLOY_PATH}" ]; then
            echo "DEPLOY_PATH secret must be set (path to deploy folder on server)."
            exit 1
          fi
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -O deploy/docker-compose.prod.yml deploy/scripts/deploy-prod.sh "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x '${DEPLOY_PATH}/deploy-prod.sh' && \
            DEPLOY_PATH='${DEPLOY_PATH}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' \
            BACKEND_IMAGE='${BACKEND_IMAGE}' NGINX_IMAGE='${NGINX_IMAGE}' IMAGE_TAG='${IMAGE_TAG}' \
            '${DEPLOY_PATH}/deploy-prod.sh'"

      - name: Smoke health check
        if: steps.freshness.outputs.should_deploy == 'true'
        env:
          PROD_HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL }}
        run: |
          if [ -z "${PROD_HEALTHCHECK_URL}" ]; then
            echo "PROD_HEALTHCHECK_URL secret must be set."
            exit 1
          fi
          curl --fail --show-error --silent --max-time 15 "${PROD_HEALTHCHECK_URL}" > /dev/null
